name: Prod — FTP deploy (reg.ru)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-prod
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # прод живёт в корне поддомена → BASE_PATH не задаём (ссылки корневые)
      - name: Build
        run: node build.mjs

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.31.198.114
          protocol: ftps
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /www/dtb.lorrrem.ru/
